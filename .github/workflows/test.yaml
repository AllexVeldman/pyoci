name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    timeout-minutes: 10

    steps:
      - uses: extractions/setup-just@v3
      - uses: actions/checkout@v6
        with:
            fetch-depth: 0
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test
        run: just test-coverage

      - name: SonarQube Scan
        # Do not run on forks or on PRs from forks
        if: ${{ !(github.event.repository.fork || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.id != github.event.pull_request.base.repo.id)) }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
